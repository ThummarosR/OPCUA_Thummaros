# mosquitto.conf  (lab — open network, no TLS)
# Run with:  mosquitto.exe -c mosquitto.conf -v

listener 1883 0.0.0.0
allow_anonymous true

# Why these two lines (Mosquitto 2.0 defaults that bite people):
#   listener 1883 0.0.0.0  -> accept connections from the network, not just localhost
#   allow_anonymous true   -> no username/password (fine for a closed class net)
